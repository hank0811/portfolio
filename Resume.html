<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume — Shashank Sekhar</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        /* =========================
           RESET
        ========================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --cream: #F5F0E8;
            --off-white: #FAF8F4;
            --dark: #1A1714;
            --dark-2: #2E2A26;
            --accent: #C4703A;
            --accent-light: #E8A87C;
            --muted: #7A7068;
            --line: rgba(26, 23, 20, 0.12);

            --font-serif: 'Cormorant Garamond', serif;
            --font-sans: 'DM Sans', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-sans);
            background: var(--off-white);
            color: var(--dark);
        }

        a {
            text-decoration: none;
        }

        /* =========================
           NAVBAR
        ========================= */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;

            display: flex;
            justify-content: space-between;
            align-items: center;

            padding: 1.5rem 4rem;

            background: rgba(250, 248, 244, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--line);
        }

        .nav-logo {
            font-family: var(--font-serif);
            font-size: 1.3rem;
            color: var(--dark);
        }

        .nav-link {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: var(--muted);
            transition: 0.3s;
        }

        .nav-link:hover {
            color: var(--accent);
        }

        /* =========================
           HERO
        ========================= */
        .hero {
            text-align: center;
            padding: 10rem 2rem 4rem;
        }

        .hero-label {
            font-size: 0.7rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 1rem;
        }

        .hero-title {
            font-family: var(--font-serif);
            font-size: clamp(3rem, 7vw, 6rem);
            font-weight: 300;
            line-height: 0.95;
            color: var(--dark);
        }

        .hero-title em {
            font-style: italic;
            color: var(--accent);
        }

        .hero-subtitle {
            margin: 1.5rem auto 0;
            max-width: 55ch;

            font-size: 1rem;
            line-height: 1.8;
            color: var(--muted);
        }

        /* =========================
           LAYOUT
        ========================= */
        .resume-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 2rem;

            padding: 2rem 4rem 5rem;
        }

        /* =========================
           SIDEBAR
        ========================= */
        .resume-sidebar {
            position: sticky;
            top: 110px;
            height: fit-content;

            padding: 2.5rem;
            background: var(--dark);
            color: var(--off-white);
        }

        .sidebar-label {
            font-size: 0.7rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--accent-light);
            margin-bottom: 1.5rem;
        }

        .sidebar-title {
            font-family: var(--font-serif);
            font-size: 2.4rem;
            font-weight: 300;
            line-height: 1.1;
            margin-bottom: 1rem;
        }

        .sidebar-text {
            color: rgba(250, 248, 244, 0.65);
            line-height: 1.8;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .resume-btn {
            display: block;
            width: 100%;

            margin-bottom: 1rem;
            padding: 1rem 1.25rem;

            border: 1px solid var(--accent-light);
            color: var(--off-white);

            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-size: 0.75rem;

            transition: 0.35s ease;
        }

        .resume-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        /* =========================
           PDF VIEWER
        ========================= */
        .resume-preview {
            position: relative;
            overflow: hidden;

            padding: 2rem;
            background: var(--cream);
            border: 1px solid var(--line);
        }

        .resume-preview::before {
            content: "";
            position: absolute;
            inset: 0;
            opacity: 0.05;

            background-image:
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 39px,
                    var(--dark) 39px,
                    var(--dark) 40px
                ),
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 39px,
                    var(--dark) 39px,
                    var(--dark) 40px
                );
        }

        .pdf-frame {
            position: relative;
            z-index: 2;

            width: 100%;
            height: 1200px;

            border: none;
            background: white;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.08);
        }

        /* =========================
           ANIMATION
        ========================= */
        .fade-up {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease;
        }

        .fade-up.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* =========================
           MOBILE
        ========================= */
        @media (max-width: 900px) {
            nav {
                padding: 1.5rem 2rem;
            }

            .resume-layout {
                grid-template-columns: 1fr;
                padding: 2rem;
            }

            .resume-sidebar {
                position: relative;
                top: 0;
            }

            .pdf-frame {
                height: 700px;
            }
        }
    </style>
</head>
<body>

    <!-- NAV -->
    <nav>
        <a href="index.html" class="nav-logo">SS</a>
        <a href="index.html" class="nav-link">Back Home</a>
    </nav>

    <!-- HERO -->
    <section class="hero fade-up">
        <p class="hero-label">Resume</p>
        <h1 class="hero-title">
            My <em>Professional</em> Resume
        </h1>
        <p class="hero-subtitle">
            View my complete resume directly here or download a copy.
        </p>
    </section>

    <!-- RESUME SECTION -->
    <section class="resume-layout">

        <!-- LEFT -->
        <aside class="resume-sidebar fade-up">
            <p class="sidebar-label">Download</p>

            <h2 class="sidebar-title">
                Resume
            </h2>

            <p class="sidebar-text">
                A concise overview of my design experience,
                technical background, and project work.
            </p>

            <a href="Resume.pdf" download class="resume-btn">
                Download Resume ↓
            </a>

            <a href="Resume.pdf" target="_blank" class="resume-btn">
                Open in New Tab ↗
            </a>
        </aside>

        <!-- RIGHT -->
        <div class="resume-preview fade-up">
            <iframe
                src="Resume.pdf#toolbar=0&navpanes=0&scrollbar=0"
                class="pdf-frame">
            </iframe>
        </div>

    </section>

    <script>
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add("visible");
                }
            });
        }, {
            threshold: 0.15
        });

        document
            .querySelectorAll(".fade-up")
            .forEach(el => observer.observe(el));
    </script>

</body>
</html>
